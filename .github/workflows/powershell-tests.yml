name: PowerShell tests

on:
  push: {}
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows-powershell-51:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Syntax tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Syntax.Tests.ps1
      - name: Parser tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Parser.Tests.ps1
      - name: Account profile tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Accounts.Tests.ps1
      - name: Regression tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Regression.Tests.ps1
      - name: Updater tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Updater.Tests.ps1
